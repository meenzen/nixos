name: "Test"
on:
  pull_request:
  push:
jobs:
  tests:
    runs-on: nixos
    steps:
      - uses: actions/checkout@v7
      - name: Setup Nix
        run: "$SETUP_NIX_SCRIPT"
      - uses: DeterminateSystems/flake-checker-action@main
      - name: Setup Attic cache
        uses: ryanccn/attic-action@v0.5.0
        with:
          endpoint: https://attic.mnzn.dev
          cache: main
          token: ${{ secrets.ATTIC_TOKEN }}
      - name: Check flake
        run: nix flake check
      - name: Install direnv
        run: |
          if ! command -v direnv >/dev/null 2>&1; then
            nix profile add nixpkgs#direnv nixpkgs#nix-direnv
          else
            echo "direnv is already installed, skipping installation"
          fi
      - name: Set up direnv
        run: direnv allow
      - name: Colmena build
        run: direnv exec . colmena build --verbose --no-build-on-target
